<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইউটিউব ভিডিও ডাউনলোডার</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 450px; border: 1px solid #333; }
        h2 { color: #ff0000; margin-bottom: 20px; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #444; border-radius: 8px; font-size: 14px; box-sizing: border-box; background: #252525; color: white; outline: none; }
        input:focus { border-color: #ff0000; }
        .btn-download { background-color: #ff0000; color: white; border: none; padding: 15px 20px; width: 100%; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-download:hover { background-color: #cc0000; transform: translateY(-2px); }
        .footer-text { margin-top: 25px; font-size: 12px; color: #888; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="box">
        <h2>YouTube Downloader</h2>
        <p style="margin-bottom: 20px; color: #bbb;">ভিডিওর লিঙ্কটি এখানে পেস্ট করুন</p>
        
        <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." autofocus>
        
        <button class="btn-download" onclick="startDownload()">ডাউনলোড শুরু করুন</button>
        
        <div class="footer-text">
            <b>নির্দেশনা:</b> বাটনে ক্লিক করলে একটি নিরাপদ ডাউনলোড পেজ খুলবে। সেখান থেকে আপনার পছন্দমতো রেজোলিউশন (720p, 1080p বা MP3) সিলেক্ট করে ডাউনলোড সম্পন্ন করুন।
        </div>
    </div>

    <script>
        function startDownload() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            
            if (!urlInput) {
                alert("দয়া করে একটি ইউটিউব ভিডিও লিঙ্ক দিন!");
                return;
            }

            if (urlInput.includes("youtube.com") || urlInput.includes("youtu.be")) {
                // সরাসরি ডাউনলোড পোর্টালে পাঠিয়ে দেওয়া হচ্ছে যাতে ব্রাউজার ব্লক না করে
                const downloadLink = `https://loader.to/api/card/?url=${encodeURIComponent(urlInput)}`;
                window.open(downloadLink, '_blank');
            } else {
                alert("এটি সঠিক ইউটিউব লিঙ্ক নয়। আবার চেষ্টা করুন।");
            }
        }
    </script>

</body>
</html>
