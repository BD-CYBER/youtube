<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইউটিউব ভিডিও ডাউনলোডার প্রো</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); text-align: center; width: 90%; max-width: 450px; border: 1px solid #333; }
        h2 { color: #ff0000; margin-bottom: 25px; font-size: 26px; font-weight: bold; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #444; border-radius: 8px; font-size: 14px; box-sizing: border-box; background: #2a2a2a; color: white; outline: none; }
        select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; background: #2a2a2a; color: white; border: 1px solid #444; font-size: 15px; cursor: pointer; }
        .btn-download { background-color: #ff0000; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-download:hover { background-color: #cc0000; transform: scale(1.02); }
        .footer { margin-top: 25px; font-size: 11px; color: #777; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>YouTube Downloader</h2>
        
        <input type="text" id="videoUrl" placeholder="ইউটিউব ভিডিওর লিঙ্ক এখানে দিন..." autofocus>
        
        <p style="text-align: left; font-size: 14px; margin-bottom: 5px; color: #bbb;">ফরম্যাট নির্বাচন করুন:</p>
        <select id="format">
            <option value="720">MP4 (720p HD)</option>
            <option value="1080">MP4 (1080p Full HD)</option>
            <option value="480">MP4 (480p)</option>
            <option value="360">MP4 (360p)</option>
            <option value="mp3">MP3 (Audio Only)</option>
            <option value="wav">WAV (Audio)</option>
        </select>
        
        <button class="btn-download" onclick="downloadAction()">ডাউনলোড লিঙ্ক তৈরি করুন</button>
        
        <div class="footer">
            বিকাশকারী: <b>BD CYBER</b><br>
            যেকোনো ভিডিওর লিঙ্ক দিয়ে ফরম্যাট বেছে নিয়ে বাটনে ক্লিক করুন।
        </div>
    </div>

    <script>
        function downloadAction() {
            const url = document.getElementById('videoUrl').value.trim();
            const format = document.getElementById('format').value;
            
            if (!url) {
                alert("দয়া করে একটি ইউটিউব ভিডিও লিঙ্ক দিন!");
                return;
            }

            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                // Loader.to API ব্যবহার করে সরাসরি নির্দিষ্ট ফরম্যাটে পাঠানো হচ্ছে
                const finalDownloadLink = `https://loader.to/api/button/?url=${encodeURIComponent(url)}&f=${format}`;
                
                // নতুন ট্যাবে পেজটি ওপেন করা হবে যেখানে ইউজার সরাসরি ডাউনলোড বাটন পাবে
                window.open(finalDownloadLink, '_blank');
            } else {
                alert("দুঃখিত! এটি সঠিক ইউটিউব লিঙ্ক নয়।");
            }
        }
    </script>

</body>
</html>
