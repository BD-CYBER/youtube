<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডাইরেক্ট ইউটিউব ডাউনলোডার</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); text-align: center; width: 100%; max-width: 450px; border: 1px solid #333; }
        h2 { color: #ff0000; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; background: #2a2a2a; color: white; outline: none; }
        .btn-main { background-color: #ff0000; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn-main:disabled { background-color: #555; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; color: #ffcc00; display: none; }
        .progress-bar { width: 100%; background-color: #333; border-radius: 5px; margin-top: 10px; display: none; }
        .progress-fill { height: 10px; background-color: #28a745; width: 0%; border-radius: 5px; transition: width 0.3s; }
    </style>
</head>
<body>

    <div class="box">
        <h2>YouTube Downloader</h2>
        <input type="text" id="videoUrl" placeholder="লিঙ্কটি এখানে পেস্ট করুন..." autofocus>
        
        <button id="dlBtn" class="btn-main" onclick="handleDownload()">সরাসরি ডাউনলোড করুন</button>
        
        <div id="status">প্রসেসিং হচ্ছে... দয়া করে অপেক্ষা করুন।</div>
        <div class="progress-bar" id="pBar">
            <div class="progress-fill" id="pFill"></div>
        </div>

        <div style="margin-top: 20px; font-size: 11px; color: #777;">
            বিকাশকারী: <b>BD CYBER</b>
        </div>
    </div>

    <script>
        async function handleDownload() {
            const url = document.getElementById('videoUrl').value.trim();
            const btn = document.getElementById('dlBtn');
            const status = document.getElementById('status');
            const pBar = document.getElementById('pBar');
            const pFill = document.getElementById('pFill');

            if (!url) {
                alert("লিঙ্ক দিন!");
                return;
            }

            // UI পরিবর্তন
            btn.disabled = true;
            status.style.display = "block";
            status.innerText = "সার্ভারের সাথে কানেক্ট করা হচ্ছে...";
            
            try {
                // আমরা একটি শক্তিশালী ফ্রিতে ব্যবহারযোগ্য API ব্যবহার করছি
                // এটি সরাসরি ভিডিও লিঙ্ক জেনারেট করে
                const response = await fetch(`https://api.boxentriq.com/youtube/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.status === 'success' || data.url) {
                    status.innerText = "ডাউনলোড শুরু হচ্ছে...";
                    pBar.style.display = "block";
                    pFill.style.width = "100%";
                    
                    // সরাসরি ব্রাউজারে ডাউনলোড ট্রিগার করা
                    const a = document.createElement('a');
                    a.href = data.url;
                    a.download = ""; // ব্রাউজারকে ফাইল সেভ করতে বলবে
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    setTimeout(() => {
                        status.innerText = "ডাউনলোড সম্পন্ন!";
                        btn.disabled = false;
                    }, 2000);
                } else {
                    throw new Error("ফাইল পাওয়া যায়নি।");
                }
            } catch (error) {
                // যদি উপরের মেথড কাজ না করে, তবে বিকল্প মেথড (একই ট্যাবে লোড করা)
                status.innerText = "বিকল্প পদ্ধতিতে চেষ্টা করা হচ্ছে...";
                window.location.href = `https://loader.to/api/card/?url=${encodeURIComponent(url)}`;
            }
        }
    </script>

</body>
</html>
