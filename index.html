<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইউটিউব ডাউনলোডার - হোম পেজ এডিশন</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); text-align: center; width: 100%; max-width: 500px; border: 1px solid #333; }
        h2 { color: #ff0000; margin-bottom: 20px; font-size: 26px; font-weight: bold; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #444; border-radius: 8px; font-size: 14px; box-sizing: border-box; background: #2a2a2a; color: white; outline: none; }
        .btn-main { background-color: #ff0000; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-bottom: 20px; }
        .btn-main:hover { background-color: #cc0000; }
        
        /* ভিডিও ডাউনলোডার সেকশন */
        #downloadSection { display: none; margin-top: 20px; width: 100%; height: 350px; border-radius: 10px; overflow: hidden; border: 1px solid #444; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .footer { margin-top: 25px; font-size: 11px; color: #777; }
        .loader-text { display: none; color: #ffcc00; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>YouTube Downloader</h2>
        <p style="color: #bbb; font-size: 14px; margin-bottom: 15px;">নতুন পেজ ছাড়াই ভিডিও ডাউনলোড করুন</p>
        
        <input type="text" id="videoUrl" placeholder="ইউটিউব ভিডিওর লিঙ্ক এখানে দিন..." autofocus>
        <button class="btn-main" onclick="startDownload()">ডাউনলোড অপশন লোড করুন</button>
        
        <div id="loader" class="loader-text">লোডিং হচ্ছে... দয়া করে অপেক্ষা করুন।</div>

        <div id="downloadSection">
            <iframe id="dlFrame" src=""></iframe>
        </div>
        
        <div class="footer">
            বিকাশকারী: <b>BD CYBER</b>
        </div>
    </div>

    <script>
        function startDownload() {
            const url = document.getElementById('videoUrl').value.trim();
            const section = document.getElementById('downloadSection');
            const frame = document.getElementById('dlFrame');
            const loader = document.getElementById('loader');
            
            if (!url) {
                alert("দয়া করে একটি লিঙ্ক দিন!");
                return;
            }

            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                // লোডার দেখানো
                loader.style.display = "block";
                section.style.display = "none";

                // আইফ্রেমের সোর্স সেট করা (সরাসরি আপনার পেজের ভেতরে দেখাবে)
                frame.src = `https://loader.to/api/card/?url=${encodeURIComponent(url)}`;
                
                // আইফ্রেম লোড হলে সেটি দেখানো
                frame.onload = function() {
                    loader.style.display = "none";
                    section.style.display = "block";
                };
            } else {
                alert("সঠিক ইউটিউব লিঙ্ক দিন!");
            }
        }
    </script>

</body>
</html>
