<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইউটিউব ভিডিও ডাউনলোডার</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; text-align: center; padding: 50px 20px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        h2 { color: #ff0000; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #ff0000; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .info { margin-top: 20px; font-size: 13px; color: #aaa; }
    </style>
</head>
<body>
    <div class="box">
        <h2>YouTube Downloader</h2>
        <p>ভিডিওর লিঙ্কটি দিন:</p>
        <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        <button onclick="downloadNow()">ডাউনলোড পেজ খুলুন</button>
        <div class="info">
            বাটনে ক্লিক করলে একটি নতুন ট্যাব খুলবে, সেখান থেকে ফরম্যাট (MP4/MP3) বেছে নিন।
        </div>
    </div>

    <script>
        function downloadNow() {
            const url = document.getElementById('videoUrl').value;
            if (!url) {
                alert("দয়া করে একটি লিঙ্ক দিন!");
                return;
            }
            // সরাসরি ডাউনলোডার পোর্টালে পাঠিয়ে দেওয়া হচ্ছে যাতে ব্লক না হয়
            const finalUrl = `https://loader.to/api/card/?url=${encodeURIComponent(url)}`;
            window.open(finalUrl, '_blank');
        }
    </script>
</body>
</html>
