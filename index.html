<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইউটিউব ভিডিও ডাউনলোডার প্রো</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); text-align: center; width: 100%; max-width: 450px; border: 1px solid #333; }
        h2 { color: #ff0000; margin-bottom: 25px; font-size: 26px; font-weight: bold; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #444; border-radius: 8px; font-size: 14px; box-sizing: border-box; background: #2a2a2a; color: white; outline: none; }
        .btn-main { background-color: #ff0000; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main:hover { background-color: #cc0000; }
        
        /* ডাউনলোড অপশন সেকশন */
        #downloadOptions { display: none; margin-top: 30px; padding-top: 20px; border-top: 1px solid #333; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .download-item { background: #2a2a2a; margin-bottom: 10px; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .download-item span { font-weight: bold; color: #ddd; }
        .btn-dl { background: #28a745; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-size: 14px; transition: 0.2s; }
        .btn-dl:hover { background: #218838; }
        
        .footer { margin-top: 25px; font-size: 11px; color: #777; }
    </style>
</head>
<body>

    <div class="box">
        <h2>YouTube Downloader</h2>
        
        <input type="text" id="videoUrl" placeholder="ইউটিউব ভিডিওর লিঙ্ক এখানে দিন..." autofocus>
        <button class="btn-main" onclick="showOptions()">ডাউনলোড অপশন দেখুন</button>
        
        <div id="downloadOptions">
            <p style="color: #ffcc00; font-size: 14px; margin-bottom: 15px;">আপনার পছন্দমতো ফরম্যাট বেছে নিন:</p>
            
            <div class="download-item">
                <span>MP4 - 1080p (Full HD)</span>
                <a href="#" class="btn-dl" id="dl-1080" target="_blank">ডাউনলোড</a>
            </div>
            <div class="download-item">
                <span>MP4 - 720p (HD)</span>
                <a href="#" class="btn-dl" id="dl-720" target="_blank">ডাউনলোড</a>
            </div>
            <div class="download-item">
                <span>MP4 - 360p</span>
                <a href="#" class="btn-dl" id="dl-360" target="_blank">ডাউনলোড</a>
            </div>
            <div class="download-item">
                <span>MP3 - Audio</span>
                <a href="#" class="btn-dl" id="dl-mp3" target="_blank">ডাউনলোড</a>
            </div>
        </div>
        
        <div class="footer">
            বিকাশকারী: <b>BD CYBER</b>
        </div>
    </div>

    <script>
        function showOptions() {
            const url = document.getElementById('videoUrl').value.trim();
            const optionsDiv = document.getElementById('downloadOptions');
            
            if (!url) {
                alert("দয়া করে একটি ইউটিউব ভিডিও লিঙ্ক দিন!");
                return;
            }

            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                // সব বাটনের লিঙ্ক সেট করা হচ্ছে
                document.getElementById('dl-1080').href = `https://loader.to/api/button/?url=${encodeURIComponent(url)}&f=1080`;
                document.getElementById('dl-720').href = `https://loader.to/api/button/?url=${encodeURIComponent(url)}&f=720`;
                document.getElementById('dl-360').href = `https://loader.to/api/button/?url=${encodeURIComponent(url)}&f=360`;
                document.getElementById('dl-mp3').href = `https://loader.to/api/button/?url=${encodeURIComponent(url)}&f=mp3`;
                
                // অপশনগুলো দেখান
                optionsDiv.style.display = "block";
            } else {
                alert("দুঃখিত! এটি সঠিক ইউটিউব লিঙ্ক নয়।");
            }
        }
    </script>

</body>
</html>
